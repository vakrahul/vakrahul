<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@900&amp;display=swap');

      .bg { fill: #060a0f; }
      .grid-line { stroke: #00fff510; stroke-width: 0.5; }
      .text-cyan { fill: #00fff5; font-family: 'Share Tech Mono', monospace; }
      .text-mag { fill: #ff00aa; font-family: 'Share Tech Mono', monospace; }
      .text-yellow { fill: #ffe600; }
      .text-white { fill: #ffffff; }
      .name-text { fill: url(#nameGrad); font-family: 'Orbitron', 'Share Tech Mono', monospace; font-weight: 900; }
      .glow-cyan { filter: url(#glowCyan); }
      .glow-mag { filter: url(#glowMag); }

      /* typing animations */
      .line1 { animation: reveal 0.5s 0.2s both; }
      .line2 { animation: reveal 0.5s 0.8s both; }
      .line3 { animation: reveal 0.5s 1.4s both; }
      .line4 { animation: reveal 0.5s 2.0s both; }
      .line5 { animation: reveal 0.5s 2.6s both; }
      .line6 { animation: reveal 0.5s 3.2s both; }
      .name-block { animation: reveal 0.8s 3.8s both; }
      .subtitle-block { animation: reveal 0.6s 4.6s both; }
      .bar1 { animation: reveal 0.3s 5.0s both; }
      .bar2 { animation: reveal 0.3s 5.2s both; }
      .bar3 { animation: reveal 0.3s 5.4s both; }

      @keyframes reveal { from { opacity: 0; } to { opacity: 1; } }

      /* cursor blink */
      .cursor { animation: blink 1s step-end infinite 5.6s; opacity: 0; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      /* name shimmer */
      .name-text { animation: shimmer 4s ease infinite 4.5s; }
      @keyframes shimmer {
        0%,100% { fill: #00fff5; }
        33% { fill: #ffffff; }
        66% { fill: #ff00aa; }
      }

      /* scan line */
      .scan { animation: scanDown 3s linear infinite 2s; }
      @keyframes scanDown {
        0% { transform: translateY(0); opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { transform: translateY(280px); opacity: 0; }
      }

      /* node pulse */
      .node { animation: nodePulse 2s ease-in-out infinite; }
      .node:nth-child(2) { animation-delay: 0.4s; }
      .node:nth-child(3) { animation-delay: 0.8s; }
      .node:nth-child(4) { animation-delay: 1.2s; }
      .node:nth-child(5) { animation-delay: 1.6s; }
      @keyframes nodePulse {
        0%,100% { opacity: 0.3; r: 3; }
        50% { opacity: 1; r: 5; }
      }

      /* wire data flow */
      .wire-dot { animation: flowDot 2s linear infinite; }
      @keyframes flowDot {
        0% { offset-distance: 0%; opacity: 1; }
        90% { opacity: 1; }
        100% { offset-distance: 100%; opacity: 0; }
      }

      /* ring spin */
      .ring-outer { animation: spinCW 8s linear infinite; transform-origin: 810px 140px; }
      .ring-inner { animation: spinCCW 5s linear infinite; transform-origin: 810px 140px; }
      @keyframes spinCW { to { transform: rotate(360deg); } }
      @keyframes spinCCW { to { transform: rotate(-360deg); } }

      /* hex pulse */
      .hex { animation: hexPulse 3s ease-in-out infinite; transform-origin: 810px 140px; }
      @keyframes hexPulse {
        0%,100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }

      /* progress bars */
      .progress-fill { animation: fillBar 2s cubic-bezier(0.2,1,0.3,1) forwards; transform-origin: left; }
      .p1 { animation-delay: 5.0s; }
      .p2 { animation-delay: 5.2s; }
      .p3 { animation-delay: 5.4s; }
      @keyframes fillBar { from { transform: scaleX(0); } to { transform: scaleX(1); } }

      /* corner brackets animate in */
      .bracket { animation: bracketIn 0.4s ease both; }
      .bracket-tl { animation-delay: 0.1s; }
      .bracket-tr { animation-delay: 0.2s; }
      .bracket-bl { animation-delay: 0.3s; }
      .bracket-br { animation-delay: 0.4s; }
      @keyframes bracketIn { from { opacity: 0; stroke-dashoffset: 40; } to { opacity: 1; stroke-dashoffset: 0; } }

    </style>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowMag" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00fff5"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ff00aa"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060a0f"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00fff5"/>
      <stop offset="100%" stop-color="#ff00aa"/>
    </linearGradient>
    <!-- wire paths for animated dots -->
    <path id="wire1" d="M 700 80 Q 750 80 780 110" fill="none"/>
    <path id="wire2" d="M 700 140 L 780 140" fill="none"/>
    <path id="wire3" d="M 700 200 Q 750 200 780 170" fill="none"/>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g opacity="0.4">
    <line class="grid-line" x1="0" y1="40" x2="900" y2="40"/>
    <line class="grid-line" x1="0" y1="80" x2="900" y2="80"/>
    <line class="grid-line" x1="0" y1="120" x2="900" y2="120"/>
    <line class="grid-line" x1="0" y1="160" x2="900" y2="160"/>
    <line class="grid-line" x1="0" y1="200" x2="900" y2="200"/>
    <line class="grid-line" x1="0" y1="240" x2="900" y2="240"/>
    <line class="grid-line" x1="100" y1="0" x2="100" y2="280"/>
    <line class="grid-line" x1="200" y1="0" x2="200" y2="280"/>
    <line class="grid-line" x1="300" y1="0" x2="300" y2="280"/>
    <line class="grid-line" x1="400" y1="0" x2="400" y2="280"/>
    <line class="grid-line" x1="500" y1="0" x2="500" y2="280"/>
    <line class="grid-line" x1="600" y1="0" x2="600" y2="280"/>
    <line class="grid-line" x1="700" y1="0" x2="700" y2="280"/>
  </g>

  <!-- Scan line -->
  <rect class="scan" x="0" y="0" width="900" height="2" fill="#00fff5" opacity="0.3"/>

  <!-- Corner brackets -->
  <g stroke="#00fff5" stroke-width="2" fill="none" stroke-dasharray="40">
    <polyline class="bracket bracket-tl" points="30,18 12,18 12,36" opacity="0.8"/>
    <polyline class="bracket bracket-tr" points="870,18 888,18 888,36" opacity="0.8"/>
    <polyline class="bracket bracket-bl" points="30,262 12,262 12,244" opacity="0.8"/>
    <polyline class="bracket bracket-br" points="870,262 888,262 888,244" opacity="0.8"/>
  </g>

  <!-- TOP STATUS BAR -->
  <rect x="0" y="0" width="900" height="14" fill="#00fff508"/>
  <text x="16" y="10" font-size="7" fill="#00fff570" font-family="'Share Tech Mono', monospace" letter-spacing="2">NEURAL.PROFILE.SYS v2.0 // BOOT SEQUENCE INITIATED // IDENTITY MODULE LOADING...</text>
  <circle cx="878" cy="7" r="3" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="866" cy="7" r="3" fill="#ffe600">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- LEFT PANEL: Terminal boot lines -->
  <g class="text-cyan" font-size="10" letter-spacing="0.5">
    <text class="line1" x="20" y="40"><tspan fill="#ff00aa">❯</tspan> sys.init() <tspan fill="#00ff88">✓ OK</tspan></text>
    <text class="line2" x="20" y="58"><tspan fill="#ff00aa">❯</tspan> loading identity matrix...</text>
    <text class="line3" x="20" y="76"><tspan fill="#ff00aa">❯</tspan> neural.connect() <tspan fill="#00ff88">✓ OK</tspan></text>
    <text class="line4" x="20" y="94"><tspan fill="#ff00aa">❯</tspan> scanning repos... <tspan fill="#ffe600">12 found</tspan></text>
    <text class="line5" x="20" y="112"><tspan fill="#ff00aa">❯</tspan> compiling skills... <tspan fill="#00ff88">✓ DONE</tspan></text>
    <text class="line6" x="20" y="130"><tspan fill="#ff00aa">❯</tspan> profile.deploy() <tspan fill="#00ff88">✓ ONLINE</tspan></text>
  </g>

  <!-- Separator line -->
  <line x1="20" y1="145" x2="660" y2="145" stroke="#00fff5" stroke-width="0.5" opacity="0.4">
    <animate attributeName="x2" from="20" to="660" dur="1s" begin="3.8s" fill="freeze"/>
  </line>
  <text x="20" y="155" font-size="7" fill="#00fff540" font-family="'Share Tech Mono', monospace" letter-spacing="3">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.9s" fill="freeze"/>
    ─── IDENTITY CONFIRMED ─────────────────────────────────────────────────────────
  </text>

  <!-- MAIN NAME -->
  <g class="name-block">
    <text x="20" y="195" font-size="42" font-weight="900" letter-spacing="6"
          font-family="'Orbitron','Share Tech Mono',monospace"
          fill="url(#nameGrad)" filter="url(#glowCyan)">VAKRAHUL</text>
    <text x="22" y="195" font-size="42" font-weight="900" letter-spacing="6"
          font-family="'Orbitron','Share Tech Mono',monospace"
          fill="url(#nameGrad)" opacity="0.3">VAKRAHUL</text>
  </g>

  <!-- SUBTITLE -->
  <g class="subtitle-block">
    <text x="20" y="220" font-size="11" fill="#ff00aa" letter-spacing="4"
          font-family="'Share Tech Mono',monospace" filter="url(#glowMag)">
      SOFTWARE ENGINEER · AI BUILDER · DSA ENTHUSIAST
    </text>
  </g>

  <!-- Progress bars at bottom -->
  <g class="bar1">
    <text x="20" y="244" font-size="8" fill="#00fff580" font-family="'Share Tech Mono',monospace" letter-spacing="1">BACKEND</text>
    <rect x="72" y="236" width="80" height="5" rx="2" fill="#00fff515"/>
    <rect x="72" y="236" width="68" height="5" rx="2" fill="url(#barGrad)" class="progress-fill p1" opacity="0.9"/>
  </g>
  <g class="bar2">
    <text x="168" y="244" font-size="8" fill="#00fff580" font-family="'Share Tech Mono',monospace" letter-spacing="1">ML/AI</text>
    <rect x="198" y="236" width="80" height="5" rx="2" fill="#00fff515"/>
    <rect x="198" y="236" width="54" height="5" rx="2" fill="url(#barGrad)" class="progress-fill p2" opacity="0.9"/>
  </g>
  <g class="bar3">
    <text x="295" y="244" font-size="8" fill="#00fff580" font-family="'Share Tech Mono',monospace" letter-spacing="1">DSA</text>
    <rect x="318" y="236" width="80" height="5" rx="2" fill="#00fff515"/>
    <rect x="318" y="236" width="72" height="5" rx="2" fill="url(#barGrad)" class="progress-fill p3" opacity="0.9"/>
  </g>

  <!-- Blinking cursor -->
  <text class="cursor" x="412" y="244" font-size="12" fill="#00fff5" font-family="'Share Tech Mono',monospace">▋</text>

  <!-- BOTTOM STATUS -->
  <rect x="0" y="266" width="900" height="14" fill="#00fff508"/>
  <text x="16" y="276" font-size="7" fill="#00fff550" font-family="'Share Tech Mono',monospace" letter-spacing="2">
    STATUS: ONLINE  //  LOC: INDIA  //  OPEN TO: COLLABORATION &amp; OPPORTUNITIES  //  MODE: BUILD
  </text>

  <!-- RIGHT PANEL: Neural orb visualization -->
  <!-- Outer decorative rings -->
  <g class="ring-outer" opacity="0.4">
    <circle cx="810" cy="140" r="85" fill="none" stroke="#00fff5" stroke-width="1" stroke-dasharray="8 4"/>
  </g>
  <g class="ring-inner" opacity="0.6">
    <circle cx="810" cy="140" r="65" fill="none" stroke="#ff00aa" stroke-width="0.8" stroke-dasharray="3 8"/>
  </g>

  <!-- Static ring -->
  <circle cx="810" cy="140" r="50" fill="none" stroke="#00fff5" stroke-width="1" opacity="0.3"/>

  <!-- Hex shape -->
  <g class="hex" opacity="0.7">
    <polygon points="810,98 845,118 845,158 810,178 775,158 775,118" fill="none" stroke="#00fff5" stroke-width="1.5"/>
  </g>

  <!-- Inner glow orb -->
  <circle cx="810" cy="140" r="30" fill="#060a0f"/>
  <circle cx="810" cy="140" r="28" fill="url(#nameGrad)" opacity="0.15"/>
  <circle cx="810" cy="140" r="20" fill="#060a0f"/>
  <circle cx="810" cy="140" r="18" fill="#00fff5" opacity="0.08">
    <animate attributeName="r" values="18;22;18" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Center icon -->
  <text x="810" y="148" text-anchor="middle" font-size="22" filter="url(#glowCyan)">🚀</text>

  <!-- Neural network nodes -->
  <g fill="#00fff5" class="glow-cyan">
    <circle class="node" cx="810" cy="80" r="4" opacity="0.8"/>
    <circle class="node" cx="860" cy="108" r="4" opacity="0.8"/>
    <circle class="node" cx="860" cy="172" r="4" opacity="0.8"/>
    <circle class="node" cx="810" cy="200" r="4" opacity="0.8"/>
    <circle class="node" cx="760" cy="172" r="4" opacity="0.8"/>
    <circle class="node" cx="760" cy="108" r="4" opacity="0.8"/>
  </g>

  <!-- Node connections (wires) -->
  <g stroke="#00fff530" stroke-width="0.8" fill="none">
    <line x1="810" y1="80" x2="860" y2="108"/>
    <line x1="860" y1="108" x2="860" y2="172"/>
    <line x1="860" y1="172" x2="810" y2="200"/>
    <line x1="810" y1="200" x2="760" y2="172"/>
    <line x1="760" y1="172" x2="760" y2="108"/>
    <line x1="760" y1="108" x2="810" y2="80"/>
    <line x1="810" y1="80" x2="810" y2="118"/>
    <line x1="860" y1="108" x2="828" y2="122"/>
    <line x1="860" y1="172" x2="828" y2="158"/>
    <line x1="810" y1="200" x2="810" y2="162"/>
    <line x1="760" y1="172" x2="792" y2="158"/>
    <line x1="760" y1="108" x2="792" y2="122"/>
  </g>

  <!-- Animated data flow dots on wires -->
  <circle r="2.5" fill="#00fff5" opacity="0.9">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0s">
      <mpath href="#wire1"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#ff00aa" opacity="0.9">
    <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.8s">
      <mpath href="#wire2"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.4s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle r="2.5" fill="#ffe600" opacity="0.9">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="1.6s">
      <mpath href="#wire3"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="1.6s"/>
  </circle>

  <!-- Corner label -->
  <text x="730" y="270" font-size="7" fill="#00fff530" font-family="'Share Tech Mono',monospace">NEURAL.NODE.ACTIVE</text>
</svg>
